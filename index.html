<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fiscal Flow</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            primaryHover: '#60a5fa',
            accent: '#06b6d4',
            card: '#1e293b',
            bgDark: '#0f172a',
            success: '#10b981',
            successHover: '#059669',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-bgDark text-gray-100 min-h-screen">

  <header class="bg-gradient-to-b from-bgDark to-card/50 border-b border-slate-700/50 py-6 shadow-lg">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <h1 class="text-4xl md:text-5xl font-bold text-primary tracking-tight drop-shadow-lg">
        Inserir Itens da Nota Fiscal
      </h1>
      <p class="mt-2 text-slate-400">
        Adicione itens, visualize e envie para processamento
      </p>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

    <section class="bg-card rounded-2xl shadow-2xl p-6 md:p-10 mb-12 border border-slate-700/50">
      <h2 class="text-2xl font-semibold text-primary mb-6">Novo Item</h2>

      <form id="itemForm" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div>
          <label for="descricao" class="block text-sm font-medium text-slate-300 mb-2">Descrição</label>
          <input type="text" id="descricao" name="descricao" placeholder="Ex: Fone de Ouvido Bluetooth"
                 class="w-full px-5 py-3 bg-slate-800 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
        </div>

        <div>
          <label for="categoria" class="block text-sm font-medium text-slate-300 mb-2">Categoria</label>
          <select id="categoria" name="categoria"
                  class="w-full px-5 py-3 bg-slate-800 border border-slate-600 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all">
            <option value="">Selecione...</option>
            <option value="Exportação">Exportação</option>
            <option value="Importação">Importação</option>
            <option value="Produto">Produto</option>
            <option value="Serviço">Serviço</option>
          </select>
        </div>

        <div>
          <label for="valor" class="block text-sm font-medium text-slate-300 mb-2">Valor (R$)</label>
          <input type="number" id="valor" name="valor" step="0.01" min="0" placeholder="0.00"
                 class="w-full px-5 py-3 bg-slate-800 border border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all"/>
        </div>
      </form>

      <div class="flex flex-col sm:flex-row gap-4">
        <button type="button" id="btnAdicionar" 
            class="flex-1 bg-primary hover:bg-primary text-white font-semibold py-3 px-8 rounded-xl transition shadow-lg">
          + Adicionar Item
        </button>

        <button type="button" id="btnVerLista" 
                class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-8 rounded-xl transition">
          Ver Lista Completa
        </button>
      </div>
    </section>

    
  </main>

  <script src="script.js"></script>
</body>
</html>
